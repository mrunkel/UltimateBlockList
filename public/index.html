<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UBL // blocklist</title>
  <meta name="description" content="Daily-updated torrent blocklist merged from Bluetack and TBG sources."/>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --green: #00ff41;
      --green-dim: #008f11;
      --green-dark: #003b00;
      --black: #000;
      --glow: rgba(0, 255, 65, 0.55);
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--green);
      font-family: "Courier New", Courier, monospace;
      overflow: hidden;
    }

    #matrix {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.85) 100%);
    }

    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15) 0px,
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 3px
      );
      animation: flicker 8s infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 0.45; }
      92% { opacity: 0.45; }
      93% { opacity: 0.3; }
      94% { opacity: 0.5; }
      95% { opacity: 0.35; }
    }

    main {
      position: relative;
      z-index: 3;
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .terminal {
      width: min(680px, 100%);
      border: 1px solid var(--green-dim);
      background: rgba(0, 5, 0, 0.88);
      box-shadow:
        0 0 30px var(--glow),
        0 0 80px rgba(0, 255, 65, 0.08),
        inset 0 0 60px rgba(0, 255, 65, 0.03);
      animation: boot-in 0.6s ease-out;
    }

    @keyframes boot-in {
      from {
        opacity: 0;
        transform: scale(0.97) translateY(8px);
        filter: brightness(2);
      }
      to {
        opacity: 1;
        transform: none;
        filter: none;
      }
    }

    .terminal-bar {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--green-dark);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--green-dim);
      text-transform: uppercase;
    }

    .dot {
      width: 9px;
      height: 9px;
      border: 1px solid var(--green-dim);
    }

    .dot.live {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .terminal-body {
      padding: 2rem 1.75rem 2.5rem;
    }

    .boot-line {
      font-size: 0.82rem;
      line-height: 1.65;
      color: var(--green-dim);
      min-height: 1.65em;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .boot-line.visible {
      color: var(--green);
    }

    .boot-line .hi {
      color: var(--green);
      text-shadow: 0 0 6px var(--glow);
    }

    h1 {
      margin: 1.25rem 0 0.75rem;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--green);
      text-shadow: 0 0 10px var(--glow), 0 0 30px rgba(0, 255, 65, 0.25);
    }

    .tagline {
      font-size: 0.85rem;
      color: var(--green-dim);
      letter-spacing: 0.06em;
      margin-bottom: 2rem;
    }

    .cursor {
      display: inline-block;
      width: 0.55em;
      height: 1em;
      background: var(--green);
      vertical-align: text-bottom;
      animation: blink 0.9s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .btn {
      display: block;
      border: 1px solid var(--green);
      background: rgba(0, 255, 65, 0.04);
      color: var(--green);
      font: inherit;
      font-size: 0.8rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 0.9rem 1.2rem;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.25s, background 0.25s, border-color 0.25s;
    }

    .btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 65, 0.15), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }

    .btn:hover::before,
    .btn:focus-visible::before {
      transform: translateX(100%);
    }

    .btn:hover,
    .btn:focus-visible {
      background: rgba(0, 255, 65, 0.1);
      box-shadow: 0 0 20px var(--glow), inset 0 0 12px rgba(0, 255, 65, 0.08);
      outline: none;
    }

    .btn.secondary {
      border-color: var(--green-dark);
      color: var(--green-dim);
      background: transparent;
      font-size: 0.72rem;
    }

    .btn.secondary:hover,
    .btn.secondary:focus-visible {
      border-color: var(--green-dim);
      color: var(--green);
    }

    .footer-line {
      margin-top: 1.75rem;
      font-size: 0.72rem;
      color: var(--green-dark);
      letter-spacing: 0.08em;
    }

    @media (prefers-reduced-motion: reduce) {
      .scanlines { animation: none; }
      .dot.live { animation: none; }
      .terminal { animation: none; }
      #matrix { display: none; }
    }
  </style>
</head>
<body>
  <canvas id="matrix" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>

  <main>
    <section class="terminal" aria-labelledby="title">
      <div class="terminal-bar">
        <span class="dot live"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span>ubl://matrix/blocklist</span>
      </div>

      <div class="terminal-body">
        <div id="boot"></div>

        <h1 id="title">Ultimate Blocklist</h1>
        <p class="tagline">Wake up, Neo. The lists have you.</p>

        <div class="actions">
          <a class="btn" href="blocklist.txt" download="blocklist.txt">
            &gt; download blocklist.txt
          </a>
          <a class="btn secondary" href="blocklist.txt">
            &gt; view raw stream
          </a>
        </div>

        <p class="footer-line">// merged bluetack + tbg // updated daily</p>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var canvas = document.getElementById("matrix");
      var ctx = canvas.getContext("2d");
      var glyphs = "ｦｱｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾂﾃﾅﾆﾇﾈﾊﾋﾐﾑﾒﾓﾔﾕﾗﾘ0123456789ABCDEF";
      var fontSize = 16;
      var columns = [];
      var animId = null;
      var reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        var count = Math.ceil(canvas.width / fontSize);
        columns = [];
        for (var c = 0; c < count; c++) {
          columns[c] = {
            y: Math.random() * canvas.height / fontSize,
            speed: 0.4 + Math.random() * 0.9
          };
        }
      }

      function randomGlyph() {
        return glyphs.charAt(Math.floor(Math.random() * glyphs.length));
      }

      function drawRain() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.06)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = fontSize + "px monospace";

        for (var i = 0; i < columns.length; i++) {
          var col = columns[i];
          var x = i * fontSize;
          var y = col.y * fontSize;

          ctx.fillStyle = "#ffffff";
          ctx.fillText(randomGlyph(), x, y);

          ctx.fillStyle = "#00ff41";
          ctx.fillText(randomGlyph(), x, y - fontSize);

          ctx.fillStyle = "rgba(0, 143, 17, 0.85)";
          ctx.fillText(randomGlyph(), x, y - fontSize * 2);

          if (y > canvas.height && Math.random() > 0.975) {
            col.y = 0;
            col.speed = 0.4 + Math.random() * 0.9;
          }
          col.y += col.speed;
        }

        animId = requestAnimationFrame(drawRain);
      }

      if (!reducedMotion) {
        window.addEventListener("resize", resize);
        resize();
        drawRain();

        document.addEventListener("visibilitychange", function () {
          if (document.hidden) {
            cancelAnimationFrame(animId);
          } else {
            drawRain();
          }
        });
      }

      var bootLines = [
        "root@matrix:~$ uname -a",
        "KERNEL 6.4.1-MATRIX // HOST ubl-core",
        "root@matrix:~$ ./ubl --init",
        "LOADING PEER FILTER MODULES .............. <span class=\"hi\">OK</span>",
        "MERGING BLUETACK + TBG LISTS ............. <span class=\"hi\">OK</span>",
        "SYNC SCHEDULE ............................ <span class=\"hi\">DAILY</span>",
        "root@matrix:~$ ./ubl --ready<span class=\"cursor\"></span>"
      ];

      var bootEl = document.getElementById("boot");
      var lineIndex = 0;
      var charIndex = 0;
      var currentLine = null;

      function typeBoot() {
        if (lineIndex >= bootLines.length) {
          return;
        }

        if (!currentLine) {
          currentLine = document.createElement("p");
          currentLine.className = "boot-line";
          bootEl.appendChild(currentLine);
          charIndex = 0;
        }

        var html = bootLines[lineIndex];
        var plain = html.replace(/<[^>]+>/g, "");

        if (charIndex < plain.length) {
          charIndex++;
          var shown = plain.slice(0, charIndex);
          currentLine.textContent = shown;
          setTimeout(typeBoot, 18 + Math.random() * 28);
          return;
        }

        currentLine.innerHTML = html;
        currentLine.classList.add("visible");
        currentLine = null;
        lineIndex++;
        setTimeout(typeBoot, lineIndex === bootLines.length ? 0 : 120 + Math.random() * 180);
      }

      if (reducedMotion) {
        bootLines.forEach(function (line) {
          var p = document.createElement("p");
          p.className = "boot-line visible";
          p.innerHTML = line.replace("<span class=\"cursor\"></span>", "");
          bootEl.appendChild(p);
        });
      } else {
        typeBoot();
      }
    })();
  </script>
</body>
</html>
